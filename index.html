<head>

    <title>Sympto‑Bot – Voice Agent</title>
    <style>
        /* ── Reset & Base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at 20% 30%, #b8e1ed, #136b7a);
            padding: 16px;
            margin: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 480px;
            height: 94vh;
            background: rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-radius: 36px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.30), inset 0 1px 0 rgba(255, 255, 255, 0.30);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        .chat-header {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 18px 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1.2;
        }

        .brand-text .title {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.2px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .brand-text .sub {
            font-size: 10px;
            font-weight: 400;
            opacity: 0.7;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #fff;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.10);
            color: #fff;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.20s ease;
            flex-shrink: 0;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.20);
            border-color: rgba(255, 255, 255, 0.30);
            transform: scale(1.05);
        }
        .icon-btn:active {
            transform: scale(0.93);
        }
        .icon-btn.active {
            background: rgba(0, 255, 180, 0.20);
            border-color: rgba(0, 255, 180, 0.50);
            box-shadow: 0 0 20px rgba(0, 255, 180, 0.10);
        }

        /* ── Messages ── */
        .chat-messages {
            flex: 1;
            padding: 18px 18px 8px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.20);
            border-radius: 8px;
        }

        /* ── Message Bubbles ── */
        .message {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 14px;
            animation: fadeIn 0.30s ease;
            word-break: break-word;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.04);
            margin-bottom: 2px;
        }

        .message.bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.13);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #f0faff;
            border-bottom-left-radius: 4px;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.04);
        }

        .message.bot strong {
            color: #fff;
            font-weight: 600;
        }

        .message.bot .section-title {
            display: block;
            font-weight: 600;
            margin-top: 6px;
            margin-bottom: 2px;
            color: #d4f0ff;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        .message.bot .section-title:first-of-type {
            margin-top: 0;
        }

        .message.user {
            align-self: flex-end;
            background: rgba(255, 255, 255, 0.50);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            color: #103f4a;
            border-bottom-right-radius: 4px;
        }

        /* ── Typing Indicator ── */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 4px 4px 4px;
            align-self: flex-start;
            margin-left: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.50);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(1) {
            animation-delay: 0s;
        }
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%,
            60%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-7px);
            }
        }

        /* ── Input Area ── */
        .chat-input {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px 18px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }

        .chat-input input {
            flex: 1;
            padding: 13px 20px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            outline: none;
            font-size: 14px;
            color: #fff;
            transition: border 0.25s, background 0.25s;
            font-family: inherit;
        }

        .chat-input input::placeholder {
            color: rgba(255, 255, 255, 0.40);
            font-weight: 300;
        }

        .chat-input input:focus {
            border-color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.10);
        }

        .chat-input .action-btn {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.10);
            color: #fff;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.20s ease;
            flex-shrink: 0;
        }

        .chat-input .action-btn:hover {
            background: rgba(255, 255, 255, 0.22);
            border-color: rgba(255, 255, 255, 0.30);
            transform: scale(1.04);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        .chat-input .action-btn:active {
            transform: scale(0.93);
        }

        .chat-input .action-btn.send-btn {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.20);
            color: #fff;
        }
        .chat-input .action-btn.send-btn:hover {
            background: rgba(255, 255, 255, 0.30);
        }

        .chat-input .action-btn.mic-btn.recording {
            background: rgba(255, 50, 50, 0.30);
            border-color: #ff4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.4);
            }
            100% {
                box-shadow: 0 0 0 10px rgba(255, 68, 68, 0);
            }
        }

        /* ── Animations ── */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ── Responsive ── */
        @media (max-width: 500px) {
            .chat-container {
                height: 98vh;
                border-radius: 24px;
            }
            .chat-header {
                padding: 14px 16px;
            }
            .brand-text .title {
                font-size: 15px;
            }
            .brand-text .sub {
                font-size: 9px;
            }
            .message {
                font-size: 13.5px;
                padding: 10px 14px;
                max-width: 90%;
            }
            .chat-input {
                padding: 10px 14px 14px;
                gap: 8px;
            }
            .chat-input input {
                font-size: 13px;
                padding: 11px 16px;
            }
            .chat-input .action-btn {
                width: 44px;
                height: 44px;
                font-size: 16px;
            }
        }

        @media (max-width: 380px) {
            .chat-container {
                border-radius: 16px;
            }
            .brand-icon {
                width: 30px;
                height: 30px;
                font-size: 16px;
            }
            .brand-text .title {
                font-size: 13px;
            }
            .chat-input input {
                font-size: 12px;
                padding: 9px 14px;
            }
            .chat-input .action-btn {
                width: 38px;
                height: 38px;
                font-size: 14px;
            }
            .icon-btn {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }
        }
    </style>
</head>

        // ─── SYMPTOM INDEX ──────────────────────────────────────────────────
        function buildSymptomIndex(db) {
            const index = {};
            for (const [key, disease] of Object.entries(db)) {
                if (disease.symptoms && Array.isArray(disease.symptoms)) {
                    for (const sym of disease.symptoms) {
                        const s = sym.toLowerCase();
                        if (!index[s]) index[s] = [];
                        if (!index[s].includes(key)) index[s].push(key);
                    }
                }
            }
            return index;
        }
        const symptomIndex = buildSymptomIndex(diseaseDB);

        // ─── UI FUNCTIONS ────────────────────────────────────────────────────
        function addMessage(text, sender) {
            const div = document.createElement("div");
            div.className = `message ${sender}`;
            if (sender === 'bot') {
                let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/\n/g, '<br>');
                div.innerHTML = html;
            } else {
                div.innerText = text;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            if (sender === 'bot') {
                speakText(text);
            }
        }

        function botReply(text) { addMessage(text, 'bot'); }

        function userReply(text) { addMessage(text, 'user'); }

        function showTyping() {
            const td = document.createElement("div");
            td.className = "typing-indicator";
            td.id = "typingIndicator";
            for (let i = 0; i < 3; i++) {
                const dot = document.createElement("div");
                dot.className = "typing-dot";
                td.appendChild(dot);
            }
            chat.appendChild(td);
            chat.scrollTop = chat.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById("typingIndicator");
            if (el) el.remove();
        }

        // ─── VOICE AGENT ──────────────────────────────────────────────────────
        function speakText(text) {
            if (!isVoiceEnabled) return;
            const cleanText = text.replace(/<[^>]*>/g, '').replace(/\*\*/g, '').replace(/\n/g, '. ');
            if (!cleanText.trim()) return;
            try {
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.rate = 0.95;
                utterance.pitch = 1;
                utterance.volume = 1;
                const voices = speechSynthesis.getVoices();
                const femaleVoice = voices.find(v => /female/i.test(v.name) || /samantha/i.test(v.name) || /zira/i.test(v
                .name));
                if (femaleVoice) utterance.voice = femaleVoice;
                speechSynthesis.speak(utterance);
            } catch (e) { console.error("TTS Error:", e); }
        }

        // ─── VOICE INPUT ──────────────────────────────────────────────────────
        function initSpeechRecognition() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) {
                micBtn.style.opacity = '0.5';
                micBtn.title = 'Voice input not supported';
                return null;
            }
            const rec = new SR();
            rec.continuous = false;
            rec.interimResults = true;
            rec.lang = 'en-US';

            rec.onresult = function(event) {
                let finalText = '';
                let interimText = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        finalText += event.results[i][0].transcript;
                    } else {
                        interimText += event.results[i][0].transcript;
                    }
                }
                const transcript = finalText || interimText;
                if (transcript.trim()) {
                    input.value = transcript;
                    if (finalText) {
                        sendMessage();
                    }
                }
            };

            rec.onend = function() {
                isListening = false;
                micBtn.classList.remove('recording');
                micBtn.innerText = '🎤';
            };

            rec.onerror = function(event) {
                console.error('Speech recognition error', event.error);
                isListening = false;
                micBtn.classList.remove('recording');
                micBtn.innerText = '🎤';
                if (event.error === 'not-allowed') {
                    alert('Microphone access denied. Please allow microphone access in your browser settings.');
                }
            };
            return rec;
        }

        function toggleListening() {
            if (!recognition) {
                recognition = initSpeechRecognition();
                if (!recognition) return;
            }
            if (isListening) {
                recognition.stop();
                return;
            }
            try {
                recognition.start();
                isListening = true;
                micBtn.classList.add('recording');
                micBtn.innerText = '⏹';
            } catch (e) {
                console.error('Could not start listening:', e);
                if (e.message.includes('already started')) {
                    recognition.stop();
                    setTimeout(() => toggleListening(), 300);
                }
            }
        }

        // ─── VOICE TOGGLE ──────────────────────────────────────────────────
        function toggleVoiceAgent() {
            isVoiceEnabled = !isVoiceEnabled;
            voiceToggle.classList.toggle('active');
            voiceToggle.innerText = isVoiceEnabled ? '🔊' : '🔇';
            if (!isVoiceEnabled) {
                speechSynthesis.cancel();
            }
        }

        // ─── SYMPTOM CHECKER ──────────────────────────────────────────────
        function symptomChecker(userInput) {
            const lower = userInput.toLowerCase();
            const words = lower.split(/[,;\s]+/).filter(w => w.length > 2);

            const scores = {};
            for (const [key, disease] of Object.entries(diseaseDB)) {
                if (!disease.symptoms || !Array.isArray(disease.symptoms)) continue;
                const syms = disease.symptoms.map(s => s.toLowerCase());
                let matchCount = 0;
                for (const w of words) {
                    for (const sym of syms) {
                        if (sym.includes(w) || w.includes(sym)) {
                            matchCount++;
                            break;
                        }
                    }
                }
                const score = matchCount / syms.length;
                if (score > 0) {
                    scores[key] = { score, matchCount, total: syms.length };
                }
            }

            const sorted = Object.entries(scores).sort((a, b) => b[1].score - a[1].score);
            if (sorted.length === 0) return null;

            const top3 = sorted.slice(0, 3);
            let response = "**Based on your symptoms, possible conditions:**\n\n";
            for (let i = 0; i < top3.length; i++) {
                const [key, data] = top3[i];
                const disease = diseaseDB[key];
                const matchPercent = Math.round(data.score * 100);
                response += `**${i+1}. ${disease.name}** (${matchPercent}% match)\n`;
                response += `   - Symptoms: ${disease.symptoms.slice(0, 4).join(', ')}...\n`;
                response += `   - Common causes: ${disease.causes}\n`;
                response += `   - Prevention: ${disease.prevention}\n\n`;
            }
            response += `\n${general.doctorAdvice}`;
            return response;
        }

        // ─── CORE BOT LOGIC ──────────────────────────────────────────────────

        function handleBotMessage(msg) {
            const lower = msg.toLowerCase().trim();

            // Emergency
            const emergencyTerms = ['emergency', 'urgent', 'die', 'dying', 'heart attack', 'stroke', 'bleeding', 'unconscious',
                'seizure', 'chest pain', 'difficulty breathing'
            ];
            if (emergencyTerms.some(t => lower.includes(t))) {
                botReply(general.emergency);
                botReply(general.doctorAdvice);
                return;
            }

            // Greetings
            const greetTerms = ['hi', 'hello', 'hey', 'good morning', 'good evening'];
            if (greetTerms.some(t => lower.includes(t))) {
                botReply(general.greet);
                return;
            }

            // Categories
            const catTerms = ['category', 'type', 'cover', 'list', 'diseases', 'conditions'];
            if (catTerms.some(t => lower.includes(t))) {
                botReply(general.categories);
                return;
            }

            // Symptom checker
            const symTriggers = ['symptom', 'check', 'feel', 'experiencing', 'having'];
            const hasComma = lower.includes(',') || lower.includes('and') || lower.includes('with');
            const symptomWords = ['fever', 'cough', 'headache', 'pain', 'fatigue', 'nausea', 'vomiting', 'rash', 'joint',
                'thirst', 'urination', 'sad', 'anxious', 'wheeze', 'breath', 'swell', 'dizzy', 'numb', 'speech', 'vision'
            ];
            const containsSymptom = symptomWords.some(w => lower.includes(w));

            if (symTriggers.some(t => lower.includes(t)) || containsSymptom || hasComma) {
                const result = symptomChecker(msg);
                if (result) {
                    botReply(result);
                } else {
                    botReply(
                        "I couldn't match your symptoms to any specific condition. Could you provide more detail? I can also give general advice.\n\n" +
                        general.doctorAdvice);
                }
                return;
            }

            // Specific disease lookup
            let foundKey = null;
            let foundDisease = null;
            for (const [key, disease] of Object.entries(diseaseDB)) {
                const name = disease.name.toLowerCase();
                if (lower.includes(key) || lower.includes(name)) {
                    foundKey = key;
                    foundDisease = disease;
                    break;
                }
            }

            if (foundDisease) {
                const d = foundDisease;
                const name = d.name;
                const sym = Array.isArray(d.symptoms) ? d.symptoms.join(', ') : d.symptoms;
                const causes = d.causes || 'Not specified.';
                const prev = d.prevention || 'Not specified.';
                const treat = d.treatment || 'Not specified.';
                const when = d.whenToSeeDoctor || 'Consult a healthcare professional.';
                const risk = d.riskFactors || 'Varies.';
                const life = d.lifestyle || 'Maintain a healthy lifestyle.';

                botReply(
                    `**${name}**\n\n` +
                    `**📋 Symptoms:**\n${sym}\n\n` +
                    `**🔍 Causes:**\n${causes}\n\n` +
                    `**🛡️ Prevention:**\n${prev}\n\n` +
                    `**💊 Treatment:**\n${treat}\n\n` +
                    `**⚠️ When to see a doctor:**\n${when}\n\n` +
                    `**🧬 Risk factors:**\n${risk}\n\n` +
                    `**🏃 Lifestyle tips:**\n${life}\n\n` +
                    `${general.doctorAdvice}`
                );
                return;
            }

            // General wellness
            const wellnessTerms = ['diet', 'exercise', 'sleep', 'stress', 'wellness', 'healthy', 'nutrition', 'fitness',
                'yoga', 'meditation'
            ];
            if (wellnessTerms.some(t => lower.includes(t))) {
                botReply(
                    `**💡 General Wellness Tips**\n\n` +
                    `• **Diet:** Eat a balanced diet rich in fruits, vegetables, whole grains, and lean proteins. Limit sugar, salt, and saturated fats.\n` +
                    `• **Exercise:** Aim for at least 150 minutes of moderate aerobic activity per week, plus strength training twice weekly.\n` +
                    `• **Sleep:** Get 7–9 hours of quality sleep nightly. Maintain a consistent sleep schedule.\n` +
                    `• **Stress:** Practice mindfulness, deep breathing, or yoga. Stay connected with friends and family.\n` +
                    `• **Hydration:** Drink adequate water throughout the day.\n` +
                    `• **Regular check-ups:** See your doctor annually and stay up-to-date with screenings.\n\n` +
                    `${general.doctorAdvice}`
                );
                return;
            }

            // Vaccination
            const vacTerms = ['vaccine', 'vaccination', 'immunization', 'shot', 'injection'];
            if (vacTerms.some(t => lower.includes(t))) {
                botReply(
                    `**💉 Vaccination Information**\n\n` +
                    `Vaccination schedules vary by age, health status, and location. Generally:\n\n` +
                    `• **Infants (0-12 months):** BCG, OPV, HepB, DPT, Hib, PCV, Rotavirus, Measles, Rubella.\n` +
                    `• **Children (1-6 years):** DTaP, IPV, MMR, Varicella, Hepatitis A, Influenza.\n` +
                    `• **Adolescents:** HPV, Tdap, Meningococcal, HPV.\n` +
                    `• **Adults:** Annual influenza, Td/Tdap, HPV (up to 45), Shingles (≥50), Pneumococcal (≥65).\n` +
                    `• **COVID-19:** Stay up-to-date with recommended boosters.\n\n` +
                    `Consult your local health authority or doctor for personalised schedules.\n\n` +
                    `${general.doctorAdvice}`
                );
                return;
            }

            // Fallback
            const suggestions = [
                "Try asking about a specific condition (e.g., 'diabetes', 'malaria', 'depression', 'heart disease').",
                "Describe your symptoms for a quick check.",
                "Ask for prevention tips or treatment options.",
                "Say 'common diseases' to see what I cover."
            ];
            const randomSuggestion = suggestions[Math.floor(Math.random() * suggestions.length)];
            botReply(
                `${general.fallback}\n\n💡 **Suggestion:** ${randomSuggestion}\n\n${general.doctorAdvice}`
            );
        }

        // ─── SEND / RECEIVE ──────────────────────────────────────────────────

        function sendMessage() {
            const msg = input.value.trim();
            if (!msg) return;
            userReply(msg);
            input.value = '';
            showTyping();
            setTimeout(() => {
                hideTyping();
                handleBotMessage(msg);
            }, 600);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        // ─── INIT ────────────────────────────────────────────────────────────

        window.onload = () => {
            botReply(general.greet);
            setTimeout(() => {
                botReply(
                    "💡 I can check symptoms, provide disease information, prevention, treatment, and lifestyle tips. Ask me anything about your health."
                    );
            }, 700);

            if ('speechSynthesis' in window) {
                speechSynthesis.getVoices();
                speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices(); };
            }
            recognition = initSpeechRecognition();
        };

        // ─── EVENT LISTENERS ─────────────────────────────────────────────────

        micBtn.addEventListener('click', toggleListening);
        voiceToggle.addEventListener('click', toggleVoiceAgent);

        // Ensure voice toggle is active by default
        voiceToggle.classList.add('active');
        voiceToggle.innerText = '🔊';
        isVoiceEnabled = true;
    </script>
</body>
</html>
