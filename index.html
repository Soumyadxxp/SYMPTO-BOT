<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes" />
    <title>Sympto‑Bot Pro — 3D Voice Agent</title>

    <!-- Google Fonts (Chakra UI inspired) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />

    <style>
        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            min-height: 100%;
            font-family: 'Inter', sans-serif;
            background: #0b0e1a;
            color: #fff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== THREE.JS CANVAS ===== */
        #three-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== OVERLAY ===== */
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: rgba(8, 12, 28, 0.55);
            z-index: 1;
            pointer-events: none;
        }

        /* ===== APP CONTAINER ===== */
        .app {
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: 0 auto;
            padding: 0.8rem 0.8rem 1.2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        /* ===== GLASS MORPHISM ===== */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .glass-dark {
            background: rgba(8, 12, 28, 0.45);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
        }

        .glass-light {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* ===== HEADER ===== */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.4rem 0.8rem;
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-icon {
            font-size: 26px;
            filter: drop-shadow(0 0 20px rgba(79, 195, 247, 0.25));
        }
        .brand-name {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #4fc3f7, #81d4fa, #b3e5fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand-name span {
            font-weight: 300;
            -webkit-text-fill-color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.5px;
        }
        .header-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            letter-spacing: 0.3px;
        }
        .header-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #66bb6a;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 0.3;
                transform: scale(0.8);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .header-actions {
            display: flex;
            gap: 6px;
        }
        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }
        .icon-btn:active {
            transform: scale(0.92);
        }
        .icon-btn.active {
            background: rgba(79, 195, 247, 0.15);
            border-color: rgba(79, 195, 247, 0.3);
            box-shadow: 0 0 24px rgba(79, 195, 247, 0.06);
        }

        /* ===== CHAT MESSAGES ===== */
        .chat-messages {
            flex: 1;
            padding: 0.8rem 0.8rem 0.4rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scroll-behavior: smooth;
            min-height: 280px;
            max-height: 55vh;
        }
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        /* ===== MESSAGE BUBBLES ===== */
        .message {
            max-width: 88%;
            padding: 10px 16px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 14px;
            animation: fadeSlide 0.3s ease;
            word-break: break-word;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.04);
            margin-bottom: 2px;
        }
        .message.bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #e8f4fd;
            border-bottom-left-radius: 4px;
        }
        .message.bot strong {
            color: #fff;
            font-weight: 600;
        }
        .message.bot .section-title {
            display: block;
            font-weight: 600;
            margin-top: 6px;
            margin-bottom: 2px;
            color: #81d4fa;
            font-size: 13px;
            letter-spacing: 0.3px;
        }
        .message.bot .section-title:first-of-type {
            margin-top: 0;
        }
        .message.user {
            align-self: flex-end;
            background: rgba(79, 195, 247, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(79, 195, 247, 0.12);
            color: #e0f0ff;
            border-bottom-right-radius: 4px;
        }

        /* ===== TYPING INDICATOR ===== */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 4px 4px 4px;
            align-self: flex-start;
            margin-left: 4px;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(1) {
            animation-delay: 0s;
        }
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typing {
            0%,
            60%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-7px);
            }
        }

        /* ===== INPUT AREA ===== */
        .chat-input {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.6rem 0.8rem 0.8rem;
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            flex-shrink: 0;
            border-radius: 0 0 28px 28px;
        }
        .chat-input input {
            flex: 1;
            padding: 11px 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            outline: none;
            font-size: 14px;
            color: #fff;
            transition: border 0.25s, background 0.25s;
            font-family: inherit;
            min-width: 0;
        }
        .chat-input input::placeholder {
            color: rgba(255, 255, 255, 0.25);
            font-weight: 300;
        }
        .chat-input input:focus {
            border-color: rgba(79, 195, 247, 0.25);
            background: rgba(255, 255, 255, 0.07);
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.12);
            transform: scale(1.04);
        }
        .action-btn:active {
            transform: scale(0.92);
        }
        .action-btn.send-btn {
            background: rgba(79, 195, 247, 0.12);
            border-color: rgba(79, 195, 247, 0.15);
            color: #81d4fa;
        }
        .action-btn.send-btn:hover {
            background: rgba(79, 195, 247, 0.2);
            border-color: rgba(79, 195, 247, 0.25);
        }
        .action-btn.mic-btn.recording {
            background: rgba(255, 50, 50, 0.2);
            border-color: #ff4444;
            animation: pulse-mic 1.2s infinite;
        }
        @keyframes pulse-mic {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.2);
            }
            100% {
                box-shadow: 0 0 0 12px rgba(255, 68, 68, 0);
            }
        }

        /* ===== FOOTER ===== */
        .app-footer {
            text-align: center;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.08);
            padding: 0.4rem 0 0.2rem;
            letter-spacing: 0.3px;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            margin-top: auto;
        }
        .app-footer a {
            color: rgba(79, 195, 247, 0.15);
            text-decoration: none;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .app {
                padding: 0.4rem 0.4rem 0.8rem;
                gap: 0.5rem;
                max-width: 100%;
            }
            .app-header {
                padding: 0.4rem 0.8rem;
                border-radius: 40px;
            }
            .brand-name {
                font-size: 17px;
            }
            .brand-icon {
                font-size: 20px;
            }
            .header-badge {
                font-size: 9px;
                padding: 3px 10px;
            }
            .header-badge .dot {
                width: 4px;
                height: 4px;
            }
            .icon-btn {
                width: 30px;
                height: 30px;
                font-size: 13px;
            }
            .chat-messages {
                min-height: 200px;
                max-height: 45vh;
                padding: 0.4rem 0.4rem 0.2rem;
            }
            .message {
                font-size: 13px;
                padding: 8px 14px;
                max-width: 92%;
            }
            .chat-input {
                padding: 0.4rem 0.4rem 0.6rem;
                gap: 6px;
                border-radius: 0 0 20px 20px;
            }
            .chat-input input {
                padding: 9px 14px;
                font-size: 13px;
            }
            .action-btn {
                width: 38px;
                height: 38px;
                font-size: 15px;
            }
            .glass {
                border-radius: 20px;
            }
            .glass-dark {
                border-radius: 20px;
            }
        }

        @media (max-width: 400px) {
            .brand-name {
                font-size: 14px;
            }
            .brand-icon {
                font-size: 17px;
            }
            .app-header {
                padding: 0.3rem 0.6rem;
                border-radius: 30px;
            }
            .icon-btn {
                width: 26px;
                height: 26px;
                font-size: 11px;
            }
            .message {
                font-size: 12px;
                padding: 6px 12px;
            }
            .chat-input input {
                font-size: 12px;
                padding: 7px 12px;
            }
            .action-btn {
                width: 34px;
                height: 34px;
                font-size: 13px;
            }
            .chat-messages {
                min-height: 160px;
                max-height: 40vh;
            }
        }

        @media (min-width: 641px) and (max-width: 1024px) {
            .app {
                max-width: 740px;
                padding: 0.6rem 1rem 1rem;
            }
            .chat-messages {
                max-height: 50vh;
                min-height: 240px;
            }
            .brand-name {
                font-size: 20px;
            }
        }

        @media (min-width: 1025px) {
            .app {
                max-width: 880px;
                padding: 1rem 1.2rem 1.2rem;
            }
            .chat-messages {
                max-height: 52vh;
                min-height: 300px;
            }
            .message {
                max-width: 82%;
            }
            .brand-name {
                font-size: 24px;
            }
            .chat-input input {
                font-size: 15px;
                padding: 13px 22px;
            }
            .action-btn {
                width: 48px;
                height: 48px;
                font-size: 19px;
            }
        }

        /* ===== SCROLLBAR FIREFOX ===== */
        .chat-messages {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.05) transparent;
        }

        /* ===== UTILITY ===== */
        .hidden {
            display: none !important;
        }

        /* Chakra-inspired accent gradient */
        .accent-glow {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>

    <!-- ===== THREE.JS CANVAS ===== -->
    <div id="three-canvas"></div>
    <div class="bg-overlay"></div>

    <!-- ===== APP ===== -->
    <div class="app" id="app">

        <!-- HEADER -->
        <header class="app-header glass">
            <div class="brand">
                <span class="brand-icon">🩺</span>
                <span class="brand-name">Sympto<span>Bot</span></span>
            </div>
            <div class="header-badge">
                <span class="dot"></span>
                <span>150+ Diseases</span>
            </div>
            <div class="header-actions">
                <button id="voiceToggle" class="icon-btn active" title="Toggle Voice Agent">🔊</button>
            </div>
        </header>

        <!-- CHAT MESSAGES -->
        <div class="chat-messages glass-dark" id="chat"></div>

        <!-- INPUT -->
        <div class="chat-input glass">
            <button id="micBtn" class="action-btn mic-btn" title="Voice Input">🎤</button>
            <input type="text" id="userInput" placeholder="Ask about symptoms, prevention, treatment…" onkeypress="handleKeyPress(event)" autocomplete="off" />
            <button onclick="sendMessage()" class="action-btn send-btn" aria-label="Send">➤</button>
        </div>

        <!-- FOOTER -->
        <footer class="app-footer">
            Powered by <a href="https://openweathermap.org" target="_blank">OpenTDB</a> &bull; 3D with Three.js
        </footer>
    </div>

    <!-- ===== THREE.JS ===== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>

    <script>
        // ============================================================
        //  THREE.JS BACKGROUND — particle field with glass‑like shimmer
        // ============================================================
        (function initThree() {
            const container = document.getElementById('three-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 14);

            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // ── Main particle system ──
            const particleCount = 2000;
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);

            const palette = [
                new THREE.Color(0x4fc3f7),
                new THREE.Color(0x81d4fa),
                new THREE.Color(0xb3e5fc),
                new THREE.Color(0x29b6f6),
                new THREE.Color(0x0288d1),
                new THREE.Color(0x7c4dff),
                new THREE.Color(0xb388ff),
            ];

            for (let i = 0; i < particleCount; i++) {
                const radius = 4 + Math.random() * 9;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = radius * Math.cos(phi);

                const col = palette[Math.floor(Math.random() * palette.length)];
                colors[i * 3] = col.r;
                colors[i * 3 + 1] = col.g;
                colors[i * 3 + 2] = col.b;
                sizes[i] = 0.06 + Math.random() * 0.25;
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const mat = new THREE.PointsMaterial({
                size: 0.14,
                vertexColors: true,
                transparent: true,
                opacity: 0.65,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true,
            });

            const particles = new THREE.Points(geo, mat);
            scene.add(particles);

            // ── Glow stars ──
            const starGeo = new THREE.BufferGeometry();
            const starCount = 160;
            const starPos = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount; i++) {
                const r = 5 + Math.random() * 10;
                const th = Math.random() * Math.PI * 2;
                const ph = Math.acos((Math.random() * 2) - 1);
                starPos[i * 3] = r * Math.sin(ph) * Math.cos(th);
                starPos[i * 3 + 1] = r * Math.sin(ph) * Math.sin(th);
                starPos[i * 3 + 2] = r * Math.cos(ph);
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({
                color: 0x4fc3f7,
                size: 0.3,
                transparent: true,
                opacity: 0.3,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true,
            });
            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            // ── Mouse / touch interaction ──
            let mx = 0,
                my = 0;
            document.addEventListener('mousemove', (e) => {
                mx = (e.clientX / window.innerWidth) * 2 - 1;
                my = (e.clientY / window.innerHeight) * 2 - 1;
            });
            document.addEventListener('touchmove', (e) => {
                if (e.touches.length) {
                    mx = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
                    my = (e.touches[0].clientY / window.innerHeight) * 2 - 1;
                }
            }, { passive: true });

            // ── Animation ──
            let t = 0;

            function animate() {
                requestAnimationFrame(animate);
                t += 0.0008;

                const rx = my * 0.2 + Math.sin(t * 0.08) * 0.04;
                const ry = mx * 0.2 + Math.cos(t * 0.06) * 0.04;
                particles.rotation.x += (rx - particles.rotation.x) * 0.008;
                particles.rotation.y += (ry - particles.rotation.y) * 0.008;
                stars.rotation.x = particles.rotation.x;
                stars.rotation.y = particles.rotation.y;

                // subtle pulse
                const pulse = 1 + Math.sin(t * 0.5) * 0.02;
                particles.material.size = 0.14 * pulse;

                renderer.render(scene, camera);
            }
            animate();

            // ── Resize ──
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();


        // ============================================================
        //  DISEASE KNOWLEDGE BASE (150+ diseases)
        // ============================================================
        const diseaseDB = {
            // ── Infectious ──
            malaria: { name: "Malaria", symptoms: ["fever", "chills", "sweating", "headache", "nausea", "vomiting", "muscle aches",
                    "fatigue"
                ], causes: "Parasite Plasmodium transmitted by Anopheles mosquitoes.",
                prevention: "Use insecticide-treated nets, wear long sleeves, use repellent, eliminate standing water.",
                treatment: "Antimalarial medications (artemisinin-based combination therapy, chloroquine).",
                whenToSeeDoctor: "Seek immediate care if you develop fever after traveling to endemic areas.",
                riskFactors: "Travel to tropical regions, lack of mosquito protection.",
                lifestyle: "Pre-travel consultation, adhere to prophylaxis, avoid mosquito bites.",
                category: "Infectious" },
            dengue: { name: "Dengue Fever", symptoms: ["high fever", "severe headache", "joint pain", "muscle pain", "nausea",
                    "vomiting", "rash", "pain behind eyes"
                ], causes: "Dengue virus transmitted by Aedes mosquitoes.",
                prevention: "Eliminate stagnant water, use repellents, wear protective clothing.",
                treatment: "Rest, hydration, acetaminophen for fever (avoid aspirin/NSAIDs).",
                whenToSeeDoctor: "Seek emergency care for severe abdominal pain, persistent vomiting, rapid breathing.",
                riskFactors: "Living in tropical areas, prior infection.",

        function buildSymptomIndex(db) {
            const idx = {};
            for (const [key, disease] of Object.entries(db)) {
                if (disease.symptoms && Array.isArray(disease.symptoms)) {
                    for (const sym of disease.symptoms) {
                        const s = sym.toLowerCase();
                        if (!idx[s]) idx[s] = [];
                        if (!idx[s].includes(key)) idx[s].push(key);
                    }
                }
            }
            return idx;
        }

            div.className = `message ${sender}`;
            if (sender === 'bot') {
                let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/\n/g, '<br>');
                div.innerHTML = html;
            } else {
                div.innerText = text;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            if (sender === 'bot') speakText(text);
        }

        function botReply(text) { addMessage(text, 'bot'); }

        function userReply(text) { addMessage(text, 'user'); }

        function showTyping() {
            const td = document.createElement('div');
            td.className = 'typing-indicator';
            td.id = 'typingIndicator';
            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('div');
                dot.className = 'typing-dot';
                td.appendChild(dot);
            }
            chat.appendChild(td);
            chat.scrollTop = chat.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        // ─── VOICE AGENT ──────────────────────────────────────────────────────
        function speakText(text) {
            if (!isVoiceEnabled) return;
            const clean = text.replace(/<[^>]*>/g, '').replace(/\*\*/g, '').replace(/\n/g, '. ');
            if (!clean.trim()) return;
            try {
                const utterance = new SpeechSynthesisUtterance(clean);
                utterance.rate = 0.92;
                utterance.pitch = 1;
                utterance.volume = 1;
                const voices = speechSynthesis.getVoices();
                const female = voices.find(v => /female/i.test(v.name) || /samantha/i.test(v.name) || /zira/i.test(v
                .name));
                if (female) utterance.voice = female;
                speechSynthesis.speak(utterance);
            } catch (e) { console.error('TTS Error:', e); }
        }

        function initSpeechRecognition() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) { micBtn.style.opacity = '0.4'; return null; }
            const rec = new SR();
            rec.continuous = false;
            rec.interimResults = true;
            rec.lang = 'en-US';

            rec.onresult = function(e) {
                let final = '',
                    interim = '';
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    if (e.results[i].isFinal) final += e.results[i][0].transcript;
                    else interim += e.results[i][0].transcript;
                }
                const transcript = final || interim;
                if (transcript.trim()) {
                    input.value = transcript;
                    if (final) sendMessage();
                }
            };
            rec.onend = function() {
                isListening = false;
                micBtn.classList.remove('recording');
                micBtn.innerText = '🎤';
            };
            rec.onerror = function(err) {
                console.error('Speech error:', err.error);
                isListening = false;
                micBtn.classList.remove('recording');
                micBtn.innerText = '🎤';
                if (err.error === 'not-allowed') alert('Microphone access denied. Please allow in browser settings.');
            };
            return rec;
        }

        function toggleListening() {
            if (!recognition) { recognition = initSpeechRecognition(); if (!recognition) return; }
            if (isListening) { recognition.stop(); return; }
            try {
                recognition.start();
                isListening = true;
                micBtn.classList.add('recording');
                micBtn.innerText = '⏹';
            } catch (e) {
                console.error('Could not start listening:', e);
                if (e.message.includes('already started')) { recognition.stop();
                    setTimeout(toggleListening, 300); }
            }
        }

        function toggleVoiceAgent() {
            isVoiceEnabled = !isVoiceEnabled;
            voiceToggle.classList.toggle('active');
            voiceToggle.innerText = isVoiceEnabled ? '🔊' : '🔇';
            if (!isVoiceEnabled) speechSynthesis.cancel();
        }

        // ─── SYMPTOM CHECKER ──────────────────────────────────────────────
        function symptomChecker(userInput) {
            const lower = userInput.toLowerCase();
            const words = lower.split(/[,;\s]+/).filter(w => w.length > 2);
            const scores = {};
            for (const [key, disease] of Object.entries(diseaseDB)) {
                if (!disease.symptoms || !Array.isArray(disease.symptoms)) continue;
                const syms = disease.symptoms.map(s => s.toLowerCase());
                let match = 0;
                for (const w of words) {
                    for (const sym of syms) {
                        if (sym.includes(w) || w.includes(sym)) { match++; break; }
                    }
                }
                const score = match / syms.length;
                if (score > 0) scores[key] = { score, match, total: syms.length };
            }
            const sorted = Object.entries(scores).sort((a, b) => b[1].score - a[1].score);
            if (sorted.length === 0) return null;

            const top3 = sorted.slice(0, 3);
            let response = '**Based on your symptoms, possible conditions:**\n\n';
            for (let i = 0; i < top3.length; i++) {
                const [key, data] = top3[i];
                const d = diseaseDB[key];
                const pct = Math.round(data.score * 100);
                response += `**${i+1}. ${d.name}** (${pct}% match)\n`;
                response += `   - Symptoms: ${d.symptoms.slice(0, 4).join(', ')}...\n`;
                response += `   - Causes: ${d.causes}\n`;
                response += `   - Prevention: ${d.prevention}\n\n`;
            }
            response += `\n${general.doctorAdvice}`;
            return response;
        }

        // ─── CORE BOT LOGIC ──────────────────────────────────────────────────
        function handleBotMessage(msg) {
            const lower = msg.toLowerCase().trim();

            // Emergency
            const emergencyTerms = ['emergency', 'urgent', 'die', 'dying', 'heart attack', 'stroke', 'bleeding',
                'unconscious', 'seizure', 'chest pain', 'difficulty breathing'
            ];
            if (emergencyTerms.some(t => lower.includes(t))) {
                botReply(general.emergency);
                botReply(general.doctorAdvice);
                return;
            }

            // Greetings
            const greetTerms = ['hi', 'hello', 'hey', 'good morning', 'good evening', 'sup'];
            if (greetTerms.some(t => lower.includes(t))) {
                botReply(general.greet);
                return;
            }

            // Categories
            const catTerms = ['category', 'type', 'cover', 'list', 'diseases', 'conditions'];
            if (catTerms.some(t => lower.includes(t))) {
                botReply(general.categories);
                return;
            }

            // Wellness
            const wellnessTerms = ['diet', 'exercise', 'sleep', 'stress', 'wellness', 'healthy', 'nutrition', 'fitness',
                'yoga', 'meditation'
            ];
            if (wellnessTerms.some(t => lower.includes(t))) {
                botReply(general.wellness + '\n\n' + general.doctorAdvice);
                return;
            }

            // Symptom checker
            const symTriggers = ['symptom', 'check', 'feel', 'experiencing', 'having'];
            const symptomWords = ['fever', 'cough', 'headache', 'pain', 'fatigue', 'nausea', 'vomiting', 'rash', 'joint',
                'thirst', 'urination', 'sad', 'anxious', 'wheeze', 'breath', 'swell', 'dizzy', 'numb', 'speech', 'vision'
            ];
            const containsSymptom = symptomWords.some(w => lower.includes(w));
            const hasComma = lower.includes(',') || lower.includes('and') || lower.includes('with');

            if (symTriggers.some(t => lower.includes(t)) || containsSymptom || hasComma) {
                const result = symptomChecker(msg);
                if (result) botReply(result);
                else botReply(
                    "I couldn't match your symptoms. Provide more detail or ask about a specific condition.\n\n" +
                    general.doctorAdvice);
                return;
            }

            // Specific disease lookup
            let foundKey = null,
                foundDisease = null;
            for (const [key, disease] of Object.entries(diseaseDB)) {
                const name = disease.name.toLowerCase();
                if (lower.includes(key) || lower.includes(name)) { foundKey = key;
                    foundDisease = disease; break; }
            }

            if (foundDisease) {
                const d = foundDisease;
                const sym = Array.isArray(d.symptoms) ? d.symptoms.join(', ') : d.symptoms;
                botReply(
                    `**${d.name}**\n\n` +
                    `**📋 Symptoms:**\n${sym}\n\n` +
                    `**🔍 Causes:**\n${d.causes}\n\n` +
                    `**🛡️ Prevention:**\n${d.prevention}\n\n` +
                    `**💊 Treatment:**\n${d.treatment}\n\n` +
                    `**⚠️ When to see a doctor:**\n${d.whenToSeeDoctor}\n\n` +
                    `**🧬 Risk factors:**\n${d.riskFactors}\n\n` +
                    `**🏃 Lifestyle tips:**\n${d.lifestyle}\n\n` +
                    `${general.doctorAdvice}`
                );
                return;
            }

            // Fallback
            const suggestions = [
                "Try asking about a specific condition (e.g., 'diabetes', 'malaria', 'depression').",
                "Describe your symptoms for a quick check.",
                "Ask for prevention tips or treatment options.",
                "Say 'common diseases' to see what I cover."
            ];
            const randomSuggestion = suggestions[Math.floor(Math.random() * suggestions.length)];
            botReply(`${general.fallback}\n\n💡 **Suggestion:** ${randomSuggestion}\n\n${general.doctorAdvice}`);
        }

        // ─── SEND / RECEIVE ──────────────────────────────────────────────────
        function sendMessage() {
            const msg = input.value.trim();
            if (!msg) return;
            userReply(msg);
            input.value = '';
            showTyping();
            setTimeout(() => { hideTyping();
                handleBotMessage(msg); }, 500);
        }

        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

        // ─── INIT ────────────────────────────────────────────────────────────
        window.onload = function() {
            botReply(general.greet);
            setTimeout(() => {
                botReply(
                    "💡 I can check symptoms, provide disease information, prevention, treatment, and lifestyle tips. Try saying 'fever, cough' or ask about a specific condition."
                    );
            }, 700);

            if ('speechSynthesis' in window) {
                speechSynthesis.getVoices();
                speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
            }
            recognition = initSpeechRecognition();
        };

        // ─── EVENT LISTENERS ─────────────────────────────────────────────────
        micBtn.addEventListener('click', toggleListening);
        voiceToggle.addEventListener('click', toggleVoiceAgent);
        voiceToggle.classList.add('active');
        voiceToggle.innerText = '🔊';
        isVoiceEnabled = true;

        // ─── KEYBOARD SHORTCUTS ─────────────────────────────────────────────
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.target === input) sendMessage();
            if (e.key === 'Escape') { input.value = '';
                input.blur(); }
        });

        console.log('🩺 Sympto‑Bot Pro loaded with 150+ diseases, 3D background, and glass UI.');
    </script>
</body>
